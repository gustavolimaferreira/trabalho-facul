<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/icone.png" type="image/x-icon">
    <title>Contato</title>
    <link rel="stylesheet" href="../estilos/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body onresize="mudouTamanho()">
    <header>
        <h1 id="titulo">Portifólio - Gustavo Ferreira</h1>

        <i id="burguer" class="material-icons" onclick="clickMenu()">menu</i>
        <nav id="menu">
            <ul>
                <li><a href="../index.html">Sobre mim</a></li>
                <li><a href="../paginas/formacao.html">Formação</a></li>
                <li><a href="../paginas/portifolio.html">Portfólio</a></li>
                <li><a href="../paginas/contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form id="formulario">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" required></textarea>

            <button id="mandar" type="submit" onclick="enviar()">Enviar</button>
        </form>
    </main>
    <footer id="rodape-contato">
        <p>Gustavo Ferreira - 2026</p>
    </footer>

    <script>
        function enviar() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const mensagem = document.getElementById('mensagem').value;

            if (nome && email && mensagem) {
                alert(`Obrigado, ${nome}! Sua mensagem foi enviada com sucesso.`);
                
                document.getElementById('formulario').reset();
            } else {
                alert('Por favor, preencha todos os campos antes de enviar.');
            }
        }
        
        function mudouTamanho() {
            if(window.innerWidth <= 600) {
                menu.style.display = 'none'
            } else {
                menu.style.display = 'block'
            }
        }

        function clickMenu() {
            if (menu.style.display == 'block') {
                menu.style.display = 'none'
            } else {
                menu.style.display = 'block'
            }
        }
    </script>
</body>
</html>
