<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="../estilos/style.css">
</head>
<body>
    <header>
        <h1 id="titulo">Portifólio - Gustavo Ferreira</h1>

        <nav>
            <ul>
                <li><a href="../sobre.html">Sobre mim</a></li>
                <li><a href="../paginas/formacao.html">Formação</a></li>
                <li><a href="../paginas/portifolio.html">Portfólio</a></li>
                <li><a href="../paginas/contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form id="formulario">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" required></textarea>

            <input id="mandar" type="button" value="Enviar" onclick="enviar()" >
        </form>
    </main>
    <footer id="rodape-contato">
        <p>Gustavo Ferreira - 2026</p>

    <script>
        function enviar() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const mensagem = document.getElementById('mensagem').value;

            if (nome && email && mensagem) {
                alert(`Obrigado, ${nome}! Sua mensagem foi enviada com sucesso.`);
                
                document.getElementById('formulario').reset();
            } else {
                alert('Por favor, preencha todos os campos antes de enviar.');
            }
        }
    </script>
</body>
</html>
